  components:
    Start:
      position:
        x: 0
        "y": 0
      tempMetlId: 1
    SQL Script:
      position:
        x: 320
        "y": 0
      tempMetlId: 3
    End Success:
      position:
        x: 470
        "y": -100
      tempMetlId: 4
    End Failure:
      position:
        x: 480
        "y": 20
      tempMetlId: 5
    TJ_LOAD_SILVER:
      position:
        x: 160
        "y": 0
      tempMetlId: 2
